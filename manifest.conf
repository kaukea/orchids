# orchids manifest v2 — what this package exposes, one typed line per entry.
# Parsed by kauk-sync (the kauk package); the engine hardcodes no layout — this
# file IS the grouping. Line types:
#   skill <name> <role>     src=skills/<name>/ → .claude/skills/<name>; role ∈
#                           dev|infra|org|all; delivery tuned per-repo in .ai.toml
#                           ([role] sections: exclude|copy|link|local, ["*"] default)
#   link <src> <dst>        absolute symlink into the clone; everyone gets it
#   template <src> <dst>    install-time copy (<project-name> substituted), then
#                           project-owned — never overwritten
#   prefix <src> <dst>      block idempotently kept at the head of dst
