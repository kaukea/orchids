        uses: actions/cache/save@v4
        with:
          path: ~/.cloud-works
          key: the-works-${{ steps.stream.outputs.id }}-${{ github.run_id }}

  revise:
    # Comment on a PR containing NONE of the gate tokens (gate tokens win first).
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.comment.user.login == 'serialseb' &&
       github.event.issue.pull_request &&
       !contains(github.event.comment.body, 'ENGAGE') &&
       !contains(github.event.comment.body, '⚙') &&
       !contains(github.event.comment.body, 'MAKE IT SO') &&
       !contains(github.event.comment.body, '🖖') &&
       !contains(github.event.comment.body, 'THAT IS ALL') &&
       !contains(github.event.comment.body, '🚪')) ||
      (github.event_name == 'workflow_dispatch' && inputs.hop == 'revise')
