# Central board-sync workflow (the orchids package owns the logic).
# Consuming repos lay a thin shim that `uses:` this file — see
# templates/board-sync-shim.yml. orchids itself triggers directly.
name: board-sync

on:
  workflow_call: {}
  workflow_dispatch: {}
  issues:
    types: [opened, edited, closed, reopened]

permissions:
  contents: write
  issues: write

jobs:
  ingest:
    # Actor gate: only the operator's own events run anything.
    if: github.event_name == 'workflow_dispatch' || github.event.sender.login == 'serialseb'
    runs-on: ubuntu-latest
    env:
      CALLABLOOM_APP_ID: ${{ secrets.CALLABLOOM_APP_ID }}
    steps:
      - name: Mint callabloom app token
        id: app-token
        if: ${{ env.CALLABLOOM_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CALLABLOOM_APP_ID }}
          private-key: ${{ secrets.CALLABLOOM_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || github.token }}
      - uses: actions/checkout@v4
        with:
          repository: kaukea/orchids
          path: .board-pkg
      - name: Ingest GitHub-born changes into the board
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          if [ -n "$APP_TOKEN" ]; then
            bot_id=$(gh api "/users/callabloom%5Bbot%5D" --jq .id)
            git config user.name "callabloom[bot]"
            git config user.email "${bot_id}+callabloom[bot]@users.noreply.github.com"
          else
            git config user.name "board-sync"
            git config user.email "actions@github.com"
          fi
          python3 .board-pkg/tools/board_gh.py pull --repo-root .
          rm -rf .board-pkg
          git add docs/TODO.md docs/TODO.md.d/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "board unchanged"; exit 0
          fi
          git commit -m "📋 Board ingest: GitHub-born changes landed

          Automated intake by the board-sync workflow: issues filed or
          closed on GitHub become board state; stubs await triage.

          Branch: main
          Co-authored-by: board-sync workflow <actions@github.com>"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase origin main
          done
          git push
